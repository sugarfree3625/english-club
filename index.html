<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Club — Разговорный клуб</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%236366f1'/><stop offset='100%25' style='stop-color:%238b5cf6'/></linearGradient></defs><circle cx='50' cy='50' r='45' fill='url(%23g)'/><text x='50' y='68' text-anchor='middle' font-size='55'>🗣️</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#6366f1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-secondary: #64748b;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-light: #eef0ff;
      --hover: #f1f5f9;
      --input-bg: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 4px 16px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.10);
      --radius: 20px;
      --radius-sm: 12px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    body.dark {
      --bg: #0b1120;
      --surface: #111827;
      --border: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --primary: #818cf8;
      --primary-hover: #6366f1;
      --primary-light: #1e293b;
      --hover: #1e293b;
      --input-bg: #1e293b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow: 0 4px 16px rgba(0,0,0,0.3);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.4);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fade-in-up { animation: fadeInUp 0.5s ease-out; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: all var(--transition);
    }
    body.dark .header {
      background: rgba(17,24,39,0.85);
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .glass-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: all var(--transition);
    }
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    body.dark .glass-card {
      background: rgba(30,41,59,0.7);
      border-color: rgba(255,255,255,0.05);
    }
    
    .btn-pulse {
      animation: pulse 2s infinite;
    }
    .btn-pulse:hover {
      animation: none;
      transform: scale(1.05);
    }
    
    .card, .modal, .profile-sidebar, .chat-sidebar, .chat-header, .feed-card, .session {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      transition: all var(--transition);
    }
    
    .card:hover, .feed-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
    }
    
    .input, .search-input, textarea, select {
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all var(--transition);
      outline: none;
    }
    
    .input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all var(--transition);
    }
    
    .btn-p {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 15px rgba(99,102,241,0.3);
    }
    .btn-p:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99,102,241,0.4);
    }
    
    .btn-o {
      border: 2px solid var(--primary);
      color: var(--primary);
      background: transparent;
    }
    .btn-o:hover {
      background: var(--primary-light);
    }
    
    .btn-sm { padding: 8px 16px; font-size: 0.8rem; }
    .w-100 { width: 100%; }
    
    .section-title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--text), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    
    .dropdown {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 0;
      min-width: 180px;
      box-shadow: var(--shadow-lg);
      animation: slideDown 0.2s ease-out;
    }
    
    .dropdown a {
      display: block;
      padding: 10px 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      transition: background var(--transition);
    }
    .dropdown a:hover {
      background: var(--hover);
    }
    
    .hero {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 50%, rgba(139,92,246,0.05) 0%, transparent 50%);
      animation: gradientShift 10s ease infinite;
    }
    
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: #fff;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      z-index: 5000;
      animation: fadeInUp 0.3s ease-out;
    }
    
    @media (max-width: 768px) {
      .container { padding: 20px 12px; }
      .section-title { font-size: 1.5rem; }
    }
  </style>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') document.body.classList.add('dark');
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
