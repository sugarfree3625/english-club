  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark') { document.documentElement.classList.add('dark'); }
      else if (saved === 'light') { document.documentElement.classList.remove('dark'); }
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) { document.documentElement.classList.add('dark'); }
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() { navigator.serviceWorker.register('/sw.js').catch(function() {}); });
    }
    var title = document.title;
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        var i = 0;
        var t = setInterval(function() { document.title = i++ % 2 === 0 ? '🔔 Вернись в English Club!' : title; }, 1500);
        document.addEventListener('visibilitychange', function h() { clearInterval(t); document.title = title; document.removeEventListener('visibilitychange', h); });
      }
    });
  </script>
